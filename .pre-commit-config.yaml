# Pre-commit hooks — the trimmed mirror of template_MLOps's config
# (AUDIT R8-12), calibrated to this repo's ~2k LOC scale.
#
# mypy stays CI-only on purpose: it needs the full dependency env
# (pydantic plugin, types-PyYAML) and the CI matrix already runs it on
# every push; duplicating that env inside pre-commit buys nothing here.
#
# Install:  pip install pre-commit && pre-commit install

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        args: ["--line-length", "120"]

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black", "--line-length", "120"]

  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args: ["--max-line-length", "120", "--extend-ignore", "E203,W503"]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
